<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Đánh giá rèn luyện TVU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            padding: 0;
            border: 1px solid #e2e5e8;
        }
        .login-header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        .login-header img {
            width: 130px;
            height: 130px;
            object-fit: fill;
            margin-bottom: 15px;
        }
        .login-header h5 {
            font-size: 15.5px;
            font-weight: 700;
            margin: 6px 0;
            color: #333;
            line-height: 1.4;
        }
        .login-body {
            padding: 25px 30px 30px;
            border-top: 1px solid #eaedf1;
        }
        .input-group-text {
            background-color: #e9ecef;
            border-left: none;
            color: #555;
            border-radius: 0 4px 4px 0;
        }
        .form-control {
            border-right: none;
            box-shadow: none !important;
            border-color: #ced4da;
            padding: 10px 15px;
            border-radius: 4px 0 0 4px;
        }
        .form-control:focus {
            border-color: #ced4da; /* Keep same border color to match image exactly */
        }
        .input-group {
            margin-bottom: 15px;
        }
        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 0;
        }
        .form-check-input {
            margin-top: 0;
            float: none;
            margin-left: 0;
            width: 18px;
            height: 18px;
            border-radius: 3px;
            cursor: pointer;
        }
        .form-check-label {
            font-weight: 700;
            color: #333;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-login {
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: #fff;
            font-weight: 500;
            border-radius: 4px;
            padding: 8px 30px;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
            color: #fff;
        }
        .btn-microsoft {
            background-color: #0d6efd;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            font-weight: 500;
            padding: 10px;
            border-radius: 4px;
        }
        .btn-microsoft:hover {
            background-color: #0b5ed7;
            color: white;
        }
        .btn-tvu {
            background-color: #dc3545;
            color: white;
            width: 100%;
            font-weight: 500;
            padding: 10px;
            border-radius: 4px;
        }
        .btn-tvu:hover {
            background-color: #c82333;
            color: white;
        }
        .row-middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            margin-top: 5px;
        }
        .forgot-password {
            display: block;
            margin-top: 25px;
            color: #0d6efd;
            text-decoration: none;
            font-size: 15px;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img src="../images/tv.jpg" alt="TVU Logo">
        <h5>PHẦN MỀM TIN HỌC</h5>
        <h5>ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN CHO SINH VIÊN CHÍNH QUY</h5>
        <h5>TẠI ĐẠI HỌC TRÀ VINH</h5>
    </div>
    <div class="login-body">
        <div class="input-group">
            <input type="email" class="form-control" placeholder="Email">
            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
        </div>
        <div class="input-group">
            <input type="password" class="form-control" placeholder="Mật khẩu">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
        </div>
        
        <div class="row-middle">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">
                    Nhớ mật khẩu
                </label>
            </div>
            <button class="btn btn-login">Đăng nhập</button>
        </div>

        <button class="btn btn-microsoft">Sinh viên (Đăng nhập bằng Email Microsoft)</button>
        <button class="btn btn-tvu">Giảng viên (Đăng nhập bằng Email TVU)</button>

        <a href="#" class="forgot-password">Quên mật khẩu?</a>
    </div>
</div>

</body>
</html>
