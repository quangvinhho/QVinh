<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Giới thiệu bản thân</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0ea5a0, #7c3aed);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      border: 4px solid rgba(255,255,255,0.3);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      text-align: center;
      margin: 10px 0;
      font-size: 26px;
    }
    .info {
      margin-top: 20px;
    }
    .field {
      background: rgba(255,255,255,0.1);
      margin: 8px 0;
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
    }
    .field label {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <img src="avata.jpg" alt="Avatar" />
    </div>
    <h1>Hồ Quang Vinh</h1>
    <div class="info">
      <div class="field"><label>Ngày sinh:</label> <span>25/08/2004</span></div>
      <div class="field"><label>Giới tính:</label> <span>Nam</span></div>
      <div class="field"><label>Lớp:</label> <span>DA22TTC</span></div>
      <div class="field"><label>Email:</label> <span>example@mail.com</span></div>
    </div>
  </div>
