<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container-wrapper {
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            background-color: #fff;
            /* To handle the top corners */
            overflow: hidden;
        }
        .header-bg {
            background-color: #90a552; /* Green from the image */
            padding: 25px 20px 45px;
            text-align: center;
            position: relative;
        }
        .header-bg h2 {
            margin: 0;
            font-weight: 700;
            color: #000;
            font-size: 26px;
        }
        .form-body {
            background-color: #fff;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            margin-top: -20px;
            padding: 30px 40px;
            position: relative;
        }
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
        }
        .form-row-col {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-label {
            width: 140px;
            flex-shrink: 0;
            margin-bottom: 0;
            color: #111;
            font-size: 15px;
        }
        .input-container {
            flex-grow: 1;
            position: relative;
        }
        .custom-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #000;
            padding: 6px 0;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: #333;
        }
        .custom-input::placeholder {
            color: #888;
        }
        .custom-textarea {
            width: 100%;
            border: 1px solid #000;
            border-radius: 2px;
            min-height: 100px;
            padding: 10px;
            outline: none;
            resize: vertical;
            margin-top: 5px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }
        .radio-group, .checkbox-group {
            display: flex;
            align-items: center;
        }
        .radio-group {
            gap: 130px; /* Space between Nam and Nữ */
        }
        .checkbox-group {
            gap: 10px; /* Space between checkboxes */
            flex-wrap: wrap;
        }
        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
            color: #111;
        }
        .btn-container {
            text-align: center;
            margin-top: 35px;
            margin-bottom: 10px;
        }
        .btn-custom {
            background-color: #90a552;
            border: 1px solid #000;
            color: #000;
            font-weight: 700;
            padding: 9px 20px;
            border-radius: 3px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 15px;
            min-width: 100px;
        }
        .btn-custom:hover {
            background-color: #7b8e45;
        }
        select.custom-input {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right center;
            padding-right: 20px;
        }
        .file-input-container {
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
            display: flex;
            align-items: center;
        }
        .file-input {
            font-size: 13px;
        }
        .calendar-icon {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container-wrapper">
    <div class="header-bg">
        <h2>Thông tin đăng ký</h2>
    </div>
    <div class="form-body">
        <div class="form-row">
            <label class="form-label">Họ tên:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Nhập họ tên">
            </div>
        </div>
        
        <div class="form-row">
            <label class="form-label">Ngày sinh:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="dd/mm/yyyy">
                <i class="fa-regular fa-calendar calendar-icon"></i>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Giới tính:</label>
            <div class="input-container radio-group">
                <label class="radio-item"><input type="radio" name="gender"> Nam</label>
                <label class="radio-item"><input type="radio" name="gender"> Nữ</label>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Địa chỉ:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Nhập địa chỉ">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">MSSV:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Nhập mã số sinh viên">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Lớp:</label>
            <div class="input-container">
                <select class="custom-input">
                    <option>DA25TTC</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Số điện thoại:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Nhập số điện thoại">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Email:</label>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Nhập email">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Ảnh đại diện:</label>
            <div class="input-container file-input-container">
                <input type="file" class="file-input">
            </div>
        </div>

        <div class="form-row">
            <label class="form-label">Sở trường:</label>
            <div class="input-container checkbox-group">
                <label class="checkbox-item"><input type="checkbox"> Thiết kế web</label>
                <label class="checkbox-item"><input type="checkbox"> Lập trình web</label>
                <label class="checkbox-item"><input type="checkbox"> Thành thạo tiếng Trung</label>
            </div>
        </div>

        <div class="form-row-col">
            <label class="form-label" style="width: auto;">Mô tả sơ lược:</label>
            <textarea class="custom-textarea"></textarea>
        </div>

        <div class="btn-container">
            <button class="btn-custom">Hủy bỏ</button>
            <button class="btn-custom">Đăng ký</button>
        </div>
    </div>
</div>

</body>
</html>
