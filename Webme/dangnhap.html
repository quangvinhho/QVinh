  <script>
    // Demo accounts
    const USERS_DB = [
      { id: 1, name: 'Quáº£n trá»‹ viÃªn', username: 'admin', password: 'admin123', role: 'admin', email: 'admin@luxstay.vn', phone: '0901234567' },
      { id: 1, name: 'Quáº£n trá»‹ viÃªn', username: 'admin', password: '123', role: 'admin', email: 'admin@luxstay.vn', phone: '0901234567' }, // backward compat
      { id: 2, name: 'Nguyá»…n VÄƒn A', username: 'user', password: 'user123', role: 'user', email: 'user@gmail.com', phone: '0987654321' }
    ];

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabs = document.querySelectorAll('#authTabs .nav-link');

      hideAlert();
      if (tab === 'login') {
        loginForm.classList.remove('d-none');
        registerForm.classList.add('d-none');
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
      } else {
        loginForm.classList.add('d-none');
        registerForm.classList.remove('d-none');
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
      }
    }

    function showAlert(msg, type = 'danger') {
      const el = document.getElementById('authAlert');
      el.className = `alert alert-${type}`;
      el.innerHTML = msg;
      el.classList.remove('d-none');
    }

    function hideAlert() {
      document.getElementById('authAlert').classList.add('d-none');
    }

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      btn.innerHTML = `<i class="fas fa-eye${isPass ? '-slash' : ''}"></i>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      const found = USERS_DB.find(u => u.username === username && u.password === password);
      if (found) {
        const sessionData = { id: found.id, name: found.name, username: found.username, role: found.role, email: found.email };
        localStorage.setItem('luxstay_user', JSON.stringify(sessionData));
        showAlert(`<i class="fas fa-check-circle me-2"></i>ÄÄƒng nháº­p thÃ nh cÃ´ng! ChÃ o má»«ng <strong>${found.name}</strong>`, 'success');
        setTimeout(() => { window.location.href = 'web.html'; }, 1200);
      } else {
        showAlert('<i class="fas fa-times-circle me-2"></i>TÃªn Ä‘Äƒng nháº­p hoáº·c máº­t kháº©u khÃ´ng Ä‘Ãºng!');
      }
      return false;
    }

    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;

      // Check duplicate username
      if (USERS_DB.some(u => u.username === username)) {
        showAlert('<i class="fas fa-times-circle me-2"></i>TÃªn Ä‘Äƒng nháº­p Ä‘Ã£ tá»“n táº¡i, vui lÃ²ng chá»n tÃªn khÃ¡c!');
        return false;
      }

      // In a real app, this would call an API. Here we simulate success.
      const newUser = { id: Date.now(), name, username, role: 'user', email };
      localStorage.setItem('luxstay_user', JSON.stringify(newUser));
      showAlert(`<i class="fas fa-check-circle me-2"></i>ÄÄƒng kÃ½ thÃ nh cÃ´ng! ChÃ o má»«ng <strong>${name}</strong>`, 'success');
      setTimeout(() => { window.location.href = 'web.html'; }, 1200);
      return false;
    }

    // Auto-fill if already logged in
    window.onload = function() {
      const user = localStorage.getItem('luxstay_user');
      if (user) {
        const parsed = JSON.parse(user);
        showAlert(`<i class="fas fa-info-circle me-2"></i>Báº¡n Ä‘ang Ä‘Äƒng nháº­p vá»›i tÆ° cÃ¡ch <strong>${parsed.name}</strong>. <a href="web.html">Vá» trang chá»§</a>`, 'info');
      }
    };
  </script>
