<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuxStay - Đăng nhập / Đăng ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #4e9dd8 0%, #1a5f8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, #4e9dd8, #1a5f8a);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .auth-header h4 { font-weight: 700; margin-bottom: 4px; }
    .auth-body { padding: 30px; }
    .nav-tabs .nav-link {
      border: none;
      color: #6c757d;
      font-weight: 600;
      padding: 10px 20px;
    }
    .nav-tabs .nav-link.active {
      color: #4e9dd8;
      border-bottom: 3px solid #4e9dd8;
      background: transparent;
    }
    .btn-auth {
      background: linear-gradient(135deg, #4e9dd8, #1a5f8a);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      transition: opacity 0.3s;
    }
    .btn-auth:hover { opacity: 0.9; color: white; }
    .form-control:focus {
      border-color: #4e9dd8;
      box-shadow: 0 0 0 0.2rem rgba(78,157,216,0.25);
    }
    .form-control { border-radius: 8px; padding: 12px; }
    .input-group-text { border-radius: 8px 0 0 8px; background: #f8f9fa; border-color: #dee2e6; }
    .back-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; }
    .back-link:hover { color: white; }
    .alert { border-radius: 8px; }
    .demo-accounts { background: #f0f7ff; border-radius: 8px; padding: 10px 14px; font-size: 13px; }
    .demo-accounts code { background: #d0e8f8; border-radius: 4px; padding: 1px 5px; }
  </style>
</head>
<body>
  <div class="auth-card bg-white">
    <div class="auth-header">
      <a href="web.html" class="back-link"><i class="fas fa-arrow-left me-1"></i>Về trang chủ</a>
      <div class="mt-3">
        <i class="fas fa-hotel fa-2x mb-2 d-block"></i>
        <h4>LuxStay</h4>
        <p class="mb-0 opacity-75" style="font-size:14px;">Hệ thống đặt phòng khách sạn</p>
      </div>
    </div>
    <div class="auth-body">
      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4 border-bottom" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" onclick="switchTab('login')">
            <i class="fas fa-sign-in-alt me-1"></i>Đăng nhập
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" onclick="switchTab('register')">
            <i class="fas fa-user-plus me-1"></i>Đăng ký
          </button>
        </li>
      </ul>

      <!-- Alert -->
      <div id="authAlert" class="alert d-none"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
            <input type="text" id="loginUsername" class="form-control" placeholder="Nhập tên đăng nhập" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" id="loginPassword" class="form-control" placeholder="Nhập mật khẩu" required />
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('loginPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
          </div>
          <a href="#" class="text-primary" style="font-size:14px;">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-auth w-100">
          <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>

        <div class="demo-accounts mt-3">
          <strong><i class="fas fa-info-circle text-primary me-1"></i>Tài khoản demo:</strong><br>
          Khách hàng: <code>user</code> / <code>user123</code><br>
          Quản trị: <code>admin</code> / <code>admin123</code>
        </div>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="registerForm" class="d-none" onsubmit="handleRegister(event)">
        <div class="mb-3">
          <label class="form-label fw-semibold">Họ và tên</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-id-card text-muted"></i></span>
            <input type="text" id="regName" class="form-control" placeholder="Nhập họ và tên đầy đủ" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
            <input type="email" id="regEmail" class="form-control" placeholder="email@example.com" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
            <input type="text" id="regUsername" class="form-control" placeholder="Chọn tên đăng nhập" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" id="regPassword" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6" />
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('regPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Số điện thoại</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-phone text-muted"></i></span>
            <input type="tel" id="regPhone" class="form-control" placeholder="09xxxxxxxx" />
          </div>
        </div>
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            Tôi đồng ý với <a href="#" class="text-primary">Điều khoản sử dụng</a> và <a href="#" class="text-primary">Chính sách bảo mật</a>
          </label>
        </div>
        <button type="submit" class="btn btn-auth w-100">
          <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Demo accounts
    const USERS_DB = [
      { id: 1, name: 'Quản trị viên', username: 'admin', password: 'admin123', role: 'admin', email: 'admin@luxstay.vn', phone: '0901234567' },
      { id: 1, name: 'Quản trị viên', username: 'admin', password: '123', role: 'admin', email: 'admin@luxstay.vn', phone: '0901234567' }, // backward compat
      { id: 2, name: 'Nguyễn Văn A', username: 'user', password: 'user123', role: 'user', email: 'user@gmail.com', phone: '0987654321' }
    ];

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabs = document.querySelectorAll('#authTabs .nav-link');

      hideAlert();
      if (tab === 'login') {
        loginForm.classList.remove('d-none');
        registerForm.classList.add('d-none');
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
      } else {
        loginForm.classList.add('d-none');
        registerForm.classList.remove('d-none');
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
      }
    }

    function showAlert(msg, type = 'danger') {
      const el = document.getElementById('authAlert');
      el.className = `alert alert-${type}`;
      el.innerHTML = msg;
      el.classList.remove('d-none');
    }

    function hideAlert() {
      document.getElementById('authAlert').classList.add('d-none');
    }

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      btn.innerHTML = `<i class="fas fa-eye${isPass ? '-slash' : ''}"></i>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      const found = USERS_DB.find(u => u.username === username && u.password === password);
      if (found) {
        const sessionData = { id: found.id, name: found.name, username: found.username, role: found.role, email: found.email };
        localStorage.setItem('luxstay_user', JSON.stringify(sessionData));
        showAlert(`<i class="fas fa-check-circle me-2"></i>Đăng nhập thành công! Chào mừng <strong>${found.name}</strong>`, 'success');
        setTimeout(() => { window.location.href = 'web.html'; }, 1200);
      } else {
        showAlert('<i class="fas fa-times-circle me-2"></i>Tên đăng nhập hoặc mật khẩu không đúng!');
      }
      return false;
    }

    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;

      // Check duplicate username
      if (USERS_DB.some(u => u.username === username)) {
        showAlert('<i class="fas fa-times-circle me-2"></i>Tên đăng nhập đã tồn tại, vui lòng chọn tên khác!');
        return false;
      }

      // In a real app, this would call an API. Here we simulate success.
      const newUser = { id: Date.now(), name, username, role: 'user', email };
      localStorage.setItem('luxstay_user', JSON.stringify(newUser));
      showAlert(`<i class="fas fa-check-circle me-2"></i>Đăng ký thành công! Chào mừng <strong>${name}</strong>`, 'success');
      setTimeout(() => { window.location.href = 'web.html'; }, 1200);
      return false;
    }

    // Auto-fill if already logged in
    window.onload = function() {
      const user = localStorage.getItem('luxstay_user');
      if (user) {
        const parsed = JSON.parse(user);
        showAlert(`<i class="fas fa-info-circle me-2"></i>Bạn đang đăng nhập với tư cách <strong>${parsed.name}</strong>. <a href="web.html">Về trang chủ</a>`, 'info');
      }
    };
  </script>

</body>
</html>
